# fly.toml para tu bot de Telegram
app = "floral-silence-bot"   # Cambia este nombre si quieres uno distinto

kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[build]
  image = "python:3.12-slim"  # Imagen base de Python
  # Puedes añadir dependencias si usas poetry o pipenv en tu Dockerfile

[env]
  BOT_TOKEN = "8592864110:AAERrsTZS4f6RpHs27kGPOKZojtLA5_6RJs"
  ALLOWED_USERS = "6094619886,6598869912"  # Tus IDs de Telegram separados por coma
  PORT = "8080"                 # Puerto que Fly asigna al container
  # Render_external_url no se necesita, usa el dominio Fly automáticamente

[experimental]
  allowed_public_ports = [8080]
  auto_rollback = true

[deploy]
  release_command = "python main.py"

[env.services]
# Fly usa un "web service" para exponer el puerto
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 8080
    handlers = ["http"]
